<div class="form-container">
  <!-- Header -->
  <div class="header">
    <button class="back-button">&lt;</button>
    <h1>Home Loan</h1>
  </div>

  <!-- Step Indicators -->
  <div class="step-indicators">
    <div class="step" [class.active]="isStepActive(1)" [class.completed]="isStepCompleted(1)">
      <div class="step-circle">1</div>
      <span class="step-label">Personal details</span>
    </div>
    <div class="step" [class.active]="isStepActive(2)" [class.completed]="isStepCompleted(2)">
      <div class="step-circle">2</div>
      <span class="step-label">Employment details</span>
    </div>
    <div class="step" [class.active]="isStepActive(3)" [class.completed]="isStepCompleted(3)">
      <div class="step-circle">3</div>
      <span class="step-label">Income Verification</span>
    </div>
  </div>

  <!-- Form Section -->
  <form [formGroup]="loanForm" class="form-section">
    <div class="section-title">Personal details</div>
    <p class="section-subtitle">Enter your personal details and start with your loan application.</p>

    <!-- Full Name -->
    <div class="form-group">
      <label for="fullName">Full Name on PAN Card <span class="required">*</span></label>
      <input type="text" id="fullName" formControlName="fullName" placeholder="Enter your full name" class="form-input">
    </div>

    <!-- Gender -->
    <div class="form-group">
      <label>Select Gender <span class="required">*</span></label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="male" name="gender" value="Male" formControlName="gender">
          <label for="male">Male</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="female" name="gender" value="Female" formControlName="gender">
          <label for="female">Female</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="other" name="gender" value="Third Gender" formControlName="gender">
          <label for="other">Third Gender</label>
        </div>
      </div>
    </div>

    <!-- Date of Birth -->
    <div class="form-group">
      <label for="dob">Date of Birth (DD/MM/YYYY) on PAN <span class="required">*</span></label>
      <input type="text" id="dob" formControlName="dob" placeholder="DD/MM/YYYY" class="form-input">
    </div>

    <!-- PAN Card Number -->
    <div class="form-group">
      <label for="panNumber">PAN Card Number <span class="required">*</span>
        <span class="info-icon" title="Personal Account Number">ⓘ</span>
      </label>
      <input type="text" id="panNumber" formControlName="panNumber" placeholder="ABCDE1234F" class="form-input">
    </div>

    <!-- Employment Type -->
    <div class="form-group">
      <label for="employmentType">Employment Type (Self-employed, Doctor, etc.) <span class="required">*</span></label>
      <select id="employmentType" formControlName="employmentType" class="form-select">
        <option value="Salaried">Salaried</option>
        <option value="Self-employed">Self-employed</option>
        <option value="Doctor">Doctor</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Net Monthly Salary -->
    <div class="form-group">
      <label for="salary">Net Monthly Salary <span class="required">*</span></label>
      <input type="text" id="salary" formControlName="monthlySalary" placeholder="₹ Net Monthly Salary" class="form-input">
    </div>

    <!-- PIN Code -->
    <div class="form-group">
      <label for="pinCode">Current Residential PIN Code <span class="required">*</span></label>
      <input type="text" id="pinCode" formControlName="pinCode" placeholder="123456" class="form-input">
    </div>

    <!-- City -->
    <div class="form-group">
      <label for="city">Current Residential City <span class="required">*</span></label>
      <input type="text" id="city" formControlName="city" placeholder="City" class="form-input">
    </div>

    <!-- Checkbox 1 -->
    <div class="checkbox-group">
      <input type="checkbox" id="terms" formControlName="termsAccepted">
      <label for="terms">I have read, understood and hereby accept the product
        <span class="link">Terms and conditions.</span><span class="required">*</span>
      </label>
    </div>

    <!-- Checkbox 2 -->
    <div class="checkbox-group">
      <input type="checkbox" id="dataSharing" formControlName="dataSharing">
      <label for="dataSharing">I authorize BFL to share my personal information with its
        <span class="link">partners</span> to process my loan request and authorize partners to connect with me for fulfilment of my loan request.<span class="required">*</span>
      </label>
    </div>

    <!-- Continue Button -->
    <button type="button" class="continue-button" (click)="onContinue()">CONTINUE</button>
  </form>
</div>
